<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Battle Simulator — Classic</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #0a0a0a;
  color: #33ff33;
  font-family: 'Courier New', Courier, monospace;
  font-size: 13px;
  height: 100vh;
  overflow: hidden;
}

#app { display: flex; flex-direction: column; height: 100vh; }

#header {
  padding: 6px 12px;
  border-bottom: 1px solid #1a5c1a;
  background: #050f05;
  font-size: 12px;
  letter-spacing: 1px;
  flex-shrink: 0;
}

#content {
  flex: 1;
  display: flex;
  overflow: hidden;
}

#board {
  flex: 1;
  overflow: auto;
  padding: 12px;
}

#board pre {
  font-size: 12px;
  line-height: 1.5;
  white-space: pre;
}

#sidebar {
  width: 300px;
  border-left: 1px solid #1a5c1a;
  padding: 12px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 3px;
}

#status {
  padding: 4px 12px;
  border-top: 1px solid #1a5c1a;
  background: #050f05;
  font-size: 11px;
  color: #1a7a1a;
  flex-shrink: 0;
}

.label {
  font-size: 11px;
  color: #1a7a1a;
  letter-spacing: 1px;
  margin-bottom: 6px;
  padding-bottom: 4px;
  border-bottom: 1px solid #0d300d;
}

.btn {
  background: none;
  border: 1px solid #1a5c1a;
  color: #33ff33;
  font-family: inherit;
  font-size: 12px;
  padding: 4px 8px;
  cursor: pointer;
  text-align: left;
  letter-spacing: 1px;
  transition: background 0.1s;
  margin-top: 4px;
}
.btn:hover { background: #051205; border-color: #33ff33; }

.action-btn {
  background: none;
  border: none;
  color: #33ff33;
  font-family: inherit;
  font-size: 12px;
  padding: 2px 4px;
  cursor: pointer;
  text-align: left;
  display: block;
  width: 100%;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.action-btn:hover { background: #051205; color: #66ff66; }

.info { font-size: 11px; white-space: pre; margin: 6px 0; color: #33ff33; }
.dim { color: #1a5c1a; font-size: 11px; padding: 4px; }
.err { color: #ff4444; }

.blink {
  color: #1a7a1a;
  animation: blink 1s step-end infinite;
  font-size: 20px;
  letter-spacing: 4px;
}
@keyframes blink { 50% { opacity: 0; } }
</style>
</head>
<body>
<div id="app"></div>

<script src="https://cdn.jsdelivr.net/npm/vue@3.4.21/dist/vue.global.js"></script>
<script src="https://cdn.jsdelivr.net/npm/vue3-sfc-loader@0.9.5/dist/vue3-sfc-loader.js"></script>
<script>
(function () {
  const { loadModule } = window['vue3-sfc-loader'];

  class BattleSimClient {
    constructor(base = 'http://localhost:3333') { this.base = base; }
    async _req(method, path, body) {
      const res = await fetch(`${this.base}${path}`, {
        method,
        headers: body !== undefined ? { 'Content-Type': 'application/json' } : {},
        body: body !== undefined ? JSON.stringify(body) : undefined,
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error ?? res.statusText);
      return data;
    }
    listGames()                          { return this._req('GET', '/games'); }
    createSession(game, players, config) { return this._req('POST', '/sessions', { game, players, config }); }
    listSessions()                       { return this._req('GET', '/sessions'); }
    getSession(id)                       { return this._req('GET', `/sessions/${id}`); }
    submitAction(id, playerId, action)   { return this._req('POST', `/sessions/${id}/action`, { playerId, action }); }
    deleteSession(id)                    { return this._req('DELETE', `/sessions/${id}`); }
  }

  const sfcOptions = {
    moduleCache: {
      vue: Vue,
      '@battle-sim/api-client': { BattleSimClient },
    },
    async getFile(url) {
      const r = await fetch(url);
      if (!r.ok) throw new Error(r.status + ' ' + url);
      return r.text();
    },
    addStyle(css) {
      const s = document.createElement('style');
      s.textContent = css;
      document.head.appendChild(s);
    },
  };

  Vue.createApp({
    components: { App: Vue.defineAsyncComponent(() => loadModule('./App.vue', sfcOptions)) },
    template: '<App/>',
  }).mount('#app');
})();
</script>
</body>
</html>
