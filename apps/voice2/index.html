<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<link rel="icon" href="data:,">
<title>Voice 2</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
  background: #0f172a; color: #f1f5f9;
  display: flex; align-items: center; justify-content: center; min-height: 100vh;
  font-size: 15px; -webkit-font-smoothing: antialiased;
}
#app {
  display: flex; flex-direction: column; align-items: center;
  gap: 24px; width: 480px; max-width: 90vw;
}
h1 { font-size: 1.5rem; font-weight: 600; color: #94a3b8; letter-spacing: 0.05em; }

#mic-btn {
  width: 96px; height: 96px; border-radius: 50%; border: none;
  background: #1e40af; color: white; font-size: 2.2rem; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.2s, transform 0.1s;
  box-shadow: 0 4px 24px rgba(30,64,175,0.5); outline: none;
}
#mic-btn:hover:not(:disabled) { background: #2563eb; }
#mic-btn:active:not(:disabled) { transform: scale(0.95); }
#mic-btn.recording {
  background: #dc2626; box-shadow: 0 4px 24px rgba(220,38,38,0.5);
  animation: pulse 1.4s ease-in-out infinite;
}
#mic-btn:disabled { opacity: 0.4; cursor: default; animation: none; }
@keyframes pulse {
  0%,100% { box-shadow: 0 4px 24px rgba(220,38,38,0.5); }
  50%      { box-shadow: 0 4px 40px rgba(220,38,38,0.85), 0 0 0 10px rgba(220,38,38,0.15); }
}

#status { font-size: 0.85rem; color: #64748b; min-height: 1.2em; letter-spacing: 0.03em; text-align: center; }
#status.active { color: #60a5fa; }
#status.error  { color: #f87171; }

#transcript-box {
  width: 100%; min-height: 120px; background: #1e293b; border: 1px solid #334155;
  border-radius: 12px; padding: 16px 20px; font-size: 1.05rem; line-height: 1.6;
  color: #e2e8f0; white-space: pre-wrap; word-break: break-word;
}
#transcript-box.empty { color: #475569; font-style: italic; }

#speak-btn {
  padding: 10px 28px; border-radius: 8px; border: none;
  background: #065f46; color: #d1fae5; font-size: 0.95rem; font-weight: 600;
  cursor: pointer; transition: background 0.15s, transform 0.1s;
  letter-spacing: 0.04em;
}
#speak-btn:hover { background: #047857; }
#speak-btn:active { transform: scale(0.96); }

#commands {
  width: 100%; background: #1e293b; border: 1px solid #334155;
  border-radius: 12px; padding: 16px 20px;
}
#commands h2 {
  font-size: 0.7rem; font-weight: 600; color: #475569;
  letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 10px;
}
#commands ul { list-style: none; display: flex; flex-direction: column; gap: 6px; }
#commands li {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 12px; border-radius: 8px;
  font-size: 0.95rem; color: #94a3b8;
  border: 1px solid transparent;
  transition: background 0.2s, color 0.2s, border-color 0.2s;
}
#commands li .cmd-key {
  font-size: 0.75rem; font-weight: 600; letter-spacing: 0.08em;
  color: #64748b; background: #0f172a; border-radius: 4px;
  padding: 2px 6px; flex-shrink: 0;
}
#commands li.matched {
  background: #0f2d1f; border-color: #166534;
  color: #4ade80;
}
#commands li.matched .cmd-key { color: #4ade80; background: #052e16; }
</style>
</head>
<body>
<div id="app">
  <h1>VOICE INPUT</h1>
  <button id="mic-btn" title="Click to record" disabled>🎤</button>
  <div id="status" class="active">Loading model…</div>
  <div id="commands">
    <h2>Voice Commands</h2>
    <ul>
      <li id="cmd-new-game"><span class="cmd-key">say</span> new game</li>
      <li id="cmd-resume-game"><span class="cmd-key">say</span> resume game</li>
    </ul>
  </div>
  <div id="transcript-box" class="empty">Transcription will appear here…</div>
  <button id="speak-btn">▶ Say "attack"</button>
</div>

<script type="importmap">
{
  "imports": {
    "/node/process.mjs": "./vendor/node/process.mjs",
    "/node/buffer.mjs": "./vendor/node/buffer.mjs",
    "/node/events.mjs": "./vendor/node/events.mjs",
    "/node/tty.mjs": "./vendor/node/tty.mjs",
    "/node/async_hooks.mjs": "./vendor/node/async_hooks.mjs",
    "/onnxruntime-web@1.14.0/es2022/onnxruntime-web.mjs": "./vendor/ort.mjs",
    "/onnxruntime-common@~1.14.0?target=es2022": "./vendor/ort-common.mjs",
    "/onnxruntime-common@1.14.0/es2022/onnxruntime-common.mjs": "./vendor/ort-common.mjs",
    "/@huggingface/jinja@^0.2.2?target=es2022": "./vendor/jinja.mjs",
    "/@huggingface/jinja@0.2.2/es2022/jinja.mjs": "./vendor/jinja.mjs"
  }
}
</script>
<script>
// Suppress: ONNX Runtime WASM graph-optimization logs, CJS require() fallback noise
const _warn = console.warn.bind(console);
const _error = console.error.bind(console);
const _onnxFilter = s => typeof s === 'string' && (
  s.includes('[W:onnxruntime:') || s.includes('Dynamic require of')
);
console.warn  = (...a) => { if (!_onnxFilter(a[0])) _warn(...a);  };
console.error = (...a) => { if (!_onnxFilter(a[0])) _error(...a); };
</script>
<script type="module">
let pipeline, env;
try {
  ({ pipeline, env } = await import('./vendor/transformers.mjs'));
  // Override CDN paths to use local vendor files
  env.backends.onnx.wasm.wasmPaths = './vendor/';
  // Use local model files instead of fetching from HuggingFace
  env.allowRemoteModels = false;
  env.localModelPath = './models/';
} catch (e) {
  document.getElementById('status').textContent = 'Failed to load library: ' + e.message;
  document.getElementById('status').className = 'error';
  throw e;
}

const micBtn       = document.getElementById('mic-btn');
const statusEl     = document.getElementById('status');
const transcriptEl = document.getElementById('transcript-box');

const COMMANDS = [
  { id: 'cmd-new-game',    phrase: 'new game',    action: () => console.log('[command] new game') },
  { id: 'cmd-resume-game', phrase: 'resume game', action: () => console.log('[command] resume game') },
];

function matchCommand(text) {
  const normalized = text.toLowerCase().replace(/[^a-z\s]/g, '').trim();
  COMMANDS.forEach(c => {
    const el = document.getElementById(c.id);
    el.classList.remove('matched');
  });
  const match = COMMANDS.find(c => normalized.includes(c.phrase));
  if (match) {
    document.getElementById(match.id).classList.add('matched');
    match.action();
  }
  return match ?? null;
}

let mediaRecorder = null;
let chunks = [];
let timerInterval = null;

function setStatus(msg, cls = '') { statusEl.textContent = msg; statusEl.className = cls; }

function startTimer() {
  const start = Date.now();
  timerInterval = setInterval(() => {
    setStatus(`Transcribing… ${((Date.now() - start) / 1000).toFixed(0)}s`, 'active');
  }, 500);
}
function stopTimer() { clearInterval(timerInterval); timerInterval = null; }

// whisper-tiny.en is ~40 MB; cached in browser Cache API after first load
let transcriber;
try {
  setStatus('Loading local model…', 'active');
  transcriber = await pipeline('automatic-speech-recognition', 'Xenova/whisper-tiny.en');
  setStatus('Tap to record');
  micBtn.disabled = false;
} catch (e) {
  setStatus('Model load failed: ' + e.message, 'error');
}

function getVoices() {
  return new Promise(resolve => {
    const v = speechSynthesis.getVoices();
    if (v.length) return resolve(v);
    speechSynthesis.addEventListener('voiceschanged', () => resolve(speechSynthesis.getVoices()), { once: true });
  });
}

// Prefer a natural/enhanced female English voice.
async function pickFemaleVoice() {
  const voices = await getVoices();
  const en = voices.filter(v => v.lang.startsWith('en'));

  // Tiers: neural/natural first, then known female names, then anything non-male-named
  const tiers = [
    v => /natural|enhanced|neural/i.test(v.name) && /samantha|karen|victoria|moira|fiona|allison|ava|susan|zira|aria|jenny|sonia|libby|mia|nora/i.test(v.name),
    v => /natural|enhanced|neural/i.test(v.name),
    v => /samantha|karen|victoria|moira|fiona|allison|ava|susan|zira|aria|jenny|sonia|libby|mia|nora/i.test(v.name),
    v => !/daniel|david|alex|fred|tom|james|oliver|rishi|liam|aaron|arthur/i.test(v.name),
  ];

  for (const tier of tiers) {
    const match = en.find(tier);
    if (match) return match;
  }
  return en[0] ?? voices[0] ?? null;
}

let _utt = null; // keep reference alive — Chrome GCs it mid-speech otherwise

document.getElementById('speak-btn').addEventListener('click', async () => {
  _utt = new SpeechSynthesisUtterance('attack me.');
  _utt.voice = await pickFemaleVoice();
  _utt.rate = 0.95;
  speechSynthesis.speak(_utt);
});

micBtn.addEventListener('click', async () => {
  if (mediaRecorder?.state === 'recording') {
    mediaRecorder.stop();
    return;
  }

  let stream;
  try { stream = await navigator.mediaDevices.getUserMedia({ audio: true }); }
  catch { setStatus('Microphone access denied', 'error'); return; }

  chunks = [];
  mediaRecorder = new MediaRecorder(stream);
  mediaRecorder.ondataavailable = e => chunks.push(e.data);
  mediaRecorder.onstop = async () => {
    stream.getTracks().forEach(t => t.stop());
    micBtn.classList.remove('recording');
    micBtn.textContent = '⏳';
    micBtn.disabled = true;

    const blob = new Blob(chunks, { type: mediaRecorder.mimeType });
    const arrayBuffer = await blob.arrayBuffer();
    const audioCtx = new AudioContext({ sampleRate: 16000 });
    let decoded;
    try { decoded = await audioCtx.decodeAudioData(arrayBuffer); }
    catch (e) { setStatus('Audio decode failed: ' + e.message, 'error'); micBtn.textContent = '🎤'; micBtn.disabled = false; return; }
    const float32 = decoded.getChannelData(0);

    startTimer();
    try {
      const result = await transcriber(float32, { language: 'english', task: 'transcribe' });
      const text = result.text?.trim() || '(silence)';
      transcriptEl.textContent = text;
      transcriptEl.classList.remove('empty');
      const matched = matchCommand(text);
      setStatus(matched ? `Command: "${matched.phrase}"` : 'Done — tap to record again');
    } catch (e) {
      setStatus('Transcription error: ' + e.message, 'error');
    } finally {
      stopTimer();
      micBtn.textContent = '🎤';
      micBtn.disabled = false;
      mediaRecorder = null;
    }
  };

  mediaRecorder.start();
  micBtn.classList.add('recording');
  micBtn.textContent = '⏹';
  setStatus('Recording… tap to stop', 'active');
});
</script>
</body>
</html>
